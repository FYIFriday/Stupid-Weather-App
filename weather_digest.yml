name: Daily Weather Digest

on:
  schedule:
    # 7:00 AM Eastern, every day. GitHub Actions uses UTC, so this is 11:00 UTC
    # (standard time) / 12:00 UTC (daylight time). Pick one — 11 UTC means
    # 7am EST / 8am EDT. Adjust to taste.
    - cron: '0 11 * * *'
  workflow_dispatch:  # lets you trigger it manually from the Actions tab

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run weather digest
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
        run: python weather_digest.py
